services:
  # ─────────────────────────────────────────────
  # PostgreSQL — Base de données principale
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: merkure_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merkure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-merkure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-merkure_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merkure} -d ${POSTGRES_DB:-merkure_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - merkure_network

  # ─────────────────────────────────────────────
  # Redis — Cache + Queues BullMQ
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: merkure_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - merkure_network

  # ─────────────────────────────────────────────
  # Redis Commander — UI pour inspecter Redis (dev uniquement)
  # ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: merkure_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - merkure_network
    profiles:
      - tools  # Lancé seulement avec --profile tools

  # ─────────────────────────────────────────────
  # Mailhog — Capture des emails en dev
  # ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: merkure_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web
    networks:
      - merkure_network
    profiles:
      - tools

volumes:
  postgres_data:
    name: merkure_postgres_data
  redis_data:
    name: merkure_redis_data

networks:
  merkure_network:
    name: merkure_network
    driver: bridge
